country: 
  type: pandas.SQLTableDataset
  table_name: Country
  credentials: sqlite

league: 
  type: pandas.SQLTableDataset
  table_name: League
  credentials: sqlite

match: 
  type: pandas.SQLTableDataset
  table_name: match
  credentials: sqlite

player: 
